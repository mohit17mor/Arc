site_name: Arc Documentation
site_url: https://mohit17mor.github.io/Arc
site_description: Autonomous AI agents that work while you sleep.
repo_url: https://github.com/mohit17mor/Arc
repo_name: mohit17mor/Arc

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Taskforce:
    - Overview: taskforce/overview.md
    - Agents: taskforce/agents.md
    - Task Queue: taskforce/tasks.md
    - Workflows: taskforce/workflows.md
  - Features:
    - Browser Automation: features/browser.md
    - Memory: features/memory.md
    - Code Intelligence: features/code-intel.md
    - Web Dashboard: features/dashboard.md
    - Voice Input: features/voice.md
    - Scheduler: features/scheduler.md
    - Liquid Web: features/liquid-web.md
    - Skills & MCP: features/skills-mcp.md
    - Workflows (YAML): features/workflows-yaml.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - Configuration: configuration.md
