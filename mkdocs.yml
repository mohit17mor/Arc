site_name: Arc Documentation
site_url: https://mohit17mor.github.io/Arc
site_description: Autonomous AI agents that work while you sleep.
repo_url: https://github.com/mohit17mor/Arc
repo_name: mohit17mor/Arc

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
    - What Arc Is: core/what-is-arc.md
    - Main Agent vs Task Agents: core/main-agent-vs-task-agents.md
    - Tasks, Chains, and Reviews: core/tasks-chains-reviews.md
  - Capabilities:
    - Overview: capabilities/overview.md
    - Browser Automation: features/browser.md
    - Web Dashboard: features/dashboard.md
    - Memory: features/memory.md
    - Code Intelligence: features/code-intel.md
    - Voice Input: features/voice.md
    - Scheduler: features/scheduler.md
    - Liquid Web: features/liquid-web.md
    - Skills: capabilities/skills.md
    - MCP: capabilities/mcp.md
    - Build Your Own Skill: capabilities/build-your-own-skill.md
  - Multi-Agent:
    - Overview: multi-agent/overview.md
    - Create Agents: multi-agent/create-agents.md
    - Queue Tasks: multi-agent/tasks.md
    - Multi-Step Chains and Reviews: multi-agent/chains-and-reviews.md
  - Providers:
    - Overview: providers/overview.md
    - Per-Agent Provider Config: providers/per-agent-config.md
    - Configuration: configuration.md
  - Reference:
    - CLI Reference: cli.md
    - Architecture: architecture.md
    - Workflows (YAML): features/workflows-yaml.md
