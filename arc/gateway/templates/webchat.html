<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc — WebChat</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dark: #1f6feb;
    --user-bg: #1f6feb;
    --agent-bg: #1c2128;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ━━━ Header ━━━ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); }
  .status-text {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ━━━ Messages area ━━━ */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14px;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: fadeIn 0.15s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
  }
  .msg.event {
    align-self: flex-start;
    background: transparent;
    color: var(--yellow);
    font-size: 12px;
    padding: 2px 8px;
    max-width: 90%;
  }
  .status-line {
    align-self: flex-start;
    background: transparent;
    color: var(--yellow);
    font-size: 12px;
    padding: 2px 8px;
    max-width: 90%;
    transition: opacity 0.15s;
  }

  /* ━━━ Plan panel ━━━ */
  .plan-panel {
    position: fixed;
    top: 50px;
    right: 16px;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 20;
    overflow: hidden;
    transition: transform 0.2s, opacity 0.2s;
  }
  .plan-panel.hidden {
    transform: translateX(320px);
    opacity: 0;
    pointer-events: none;
  }
  .plan-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .plan-header h3 {
    margin: 0;
    font-size: 13px;
    color: var(--accent);
  }
  .plan-header .plan-progress {
    font-size: 12px;
    color: var(--text-dim);
  }
  .plan-header .plan-close {
    font-size: 16px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .plan-header .plan-close:hover { color: var(--text); }
  .plan-steps {
    padding: 8px 0;
    max-height: 300px;
    overflow-y: auto;
  }
  .plan-step {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--text);
  }
  .plan-step .step-icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }
  .plan-step.completed { color: var(--text-dim); }
  .plan-step.completed .step-text { text-decoration: line-through; }
  .plan-step.in_progress { color: var(--accent); font-weight: 600; }
  @media (max-width: 600px) {
    .plan-panel { right: 8px; left: 8px; width: auto; top: 45px; }
  }
  .sync-label {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 2px;
    opacity: 0.8;
  }

  .thinking {
    align-self: flex-start;
    color: var(--text-dim);
    font-size: 13px;
    padding: 6px 12px;
  }
  .thinking::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%  { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ━━━ Input area ━━━ */
  .input-area {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  /* ━━━ Command autocomplete ━━━ */
  .cmd-menu {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  .cmd-menu.visible { display: block; }
  .cmd-item {
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.1s;
  }
  .cmd-item:hover, .cmd-item.active {
    background: var(--bg);
  }
  .cmd-item .cmd-name {
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
  }
  .cmd-item .cmd-desc {
    color: var(--text-dim);
    font-size: 12px;
    margin-left: 12px;
  }
  #msg-input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 150px;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text-dim); }
  #send-btn {
    padding: 10px 18px;
    background: var(--accent-dark);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  #send-btn:hover { background: var(--accent); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ━━━ Responsive ━━━ */
  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    .header { padding: 10px 14px; }
    .messages { padding: 14px; }
    .input-area { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ <span>Arc</span> Gateway</h1>
  <div style="display:flex; align-items:center; gap:4px;">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Connecting…</span>
  </div>
</div>

<div class="messages" id="messages"></div>

<!-- Plan panel (hidden by default, shown when agent creates a plan) -->
<div class="plan-panel hidden" id="plan-panel">
  <div class="plan-header" id="plan-header">
    <h3>📋 Plan</h3>
    <span class="plan-progress" id="plan-progress"></span>
    <span class="plan-close" id="plan-close">×</span>
  </div>
  <div class="plan-steps" id="plan-steps"></div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="cmd-menu" id="cmd-menu"></div>
    <textarea id="msg-input" placeholder="Message Arc…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
(function() {
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const cmdMenu    = document.getElementById('cmd-menu');

  // Plan panel elements
  const planPanel    = document.getElementById('plan-panel');
  const planProgress = document.getElementById('plan-progress');
  const planSteps    = document.getElementById('plan-steps');
  const planClose    = document.getElementById('plan-close');

  let ws = null;
  let currentAgentMsg = null;   // The <div> being streamed into
  let thinkingEl = null;
  let reconnectDelay = 1000;
  let cmdActiveIdx = -1;        // keyboard selection index in command menu
  const syncState = new Map();

  // ━━━ Slash command definitions ━━━
  const COMMANDS = [
    { name: '/help',           desc: 'Show available commands' },
    { name: '/skills',         desc: 'List skills and tools' },
    { name: '/cost',           desc: 'Token usage and cost' },
    { name: '/memory',         desc: 'Core facts (long-term memory)' },
    { name: '/memory episodic',desc: 'Recent episodic memories' },
    { name: '/jobs',           desc: 'List scheduled jobs' },
    { name: '/workflow',       desc: 'List or run workflows' },
    { name: '/mcp',            desc: 'MCP server status' },
    { name: '/clear',          desc: 'Clear conversation' },
    { name: '/status',         desc: 'Gateway status' },
  ];

  function showCmdMenu(filter) {
    var matches = COMMANDS.filter(function(c) {
      return c.name.startsWith(filter);
    });
    if (matches.length === 0 || filter === '') {
      hideCmdMenu();
      return;
    }
    cmdMenu.innerHTML = '';
    matches.forEach(function(c, i) {
      var el = document.createElement('div');
      el.className = 'cmd-item' + (i === cmdActiveIdx ? ' active' : '');
      el.innerHTML = '<span class="cmd-name">' + c.name + '</span><span class="cmd-desc">' + c.desc + '</span>';
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        inputEl.value = c.name;
        hideCmdMenu();
        inputEl.focus();
      });
      cmdMenu.appendChild(el);
    });
    cmdMenu.classList.add('visible');
  }

  function hideCmdMenu() {
    cmdMenu.classList.remove('visible');
    cmdMenu.innerHTML = '';
    cmdActiveIdx = -1;
  }

  function getVisibleCmdItems() {
    return cmdMenu.querySelectorAll('.cmd-item');
  }

  // ━━━ WebSocket connection ━━━
  let hasLoadedHistory = false;  // only load history once per page load

  function connect() {
    // Close existing connection if any (prevents duplicates)
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      ws.onclose = null;  // prevent reconnect loop
      ws.close();
    }

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
      reconnectDelay = 1000;
      inputEl.focus();
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected — reconnecting…';
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
    };

    ws.onerror = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Connection error';
    };

    ws.onmessage = (e) => {
      let data;
      try { data = JSON.parse(e.data); } catch { return; }
      handleServerMessage(data);
    };
  }

  function handleServerMessage(data) {
    switch (data.type) {
      case 'connected':
        addSystem(data.message || 'Connected to Arc');
        break;

      case 'history':
        // Only load history once per page load (not on reconnects)
        if (!hasLoadedHistory && data.messages && data.messages.length > 0) {
          hasLoadedHistory = true;
          data.messages.forEach(function(m) {
            if (m.source && m.source !== 'webchat') {
              handleSyncComplete(m.source, m.user_input, m.response, null);
            } else {
              addUser(m.user_input);
              addAgent(m.response);
            }
          });
          scrollDown();
        }
        break;

      case 'thinking':
        showThinking();
        break;

      case 'chunk':
        hideThinking();
        clearStatus();
        appendChunk(data.content);
        break;

      case 'done':
        hideThinking();
        clearStatus();
        finalizeAgent();
        break;

      case 'error':
        hideThinking();
        clearStatus();
        finalizeAgent();
        addSystem('⚠ ' + (data.message || 'Unknown error'));
        break;

      case 'command_result':
        addAgent(data.content || '');
        break;

      case 'workflow_progress':
        appendChunk(data.content || '');
        scrollDown();
        break;

      case 'workflow_event':
        handleWorkflowEvent(data.event, data.data);
        break;

      case 'event':
        handleEvent(data.event, data.data);
        break;

      case 'sync_user':
        handleSyncUser(
          data.source || 'webchat',
          data.user_input || '',
          data.message_id || null,
        );
        break;

      case 'sync':
        handleSyncComplete(
          data.source || 'webchat',
          data.user_input || '',
          data.response || '',
          data.message_id || null,
        );
        break;

      case 'pong':
        break;

      case 'notification':
        hideThinking();
        var jobName = data.job_name || 'Background task';
        var content = data.content || '';
        addSystem('🔔 ' + jobName + ' completed:\n' + content);
        break;
    }
    scrollDown();
  }

  // ━━━ Event display ━━━
  function handleEvent(eventType, eventData) {
    if (eventType === 'skill:tool_call') {
      const tool = eventData.tool || 'unknown';
      const args = eventData.arguments || {};
      const parts = Object.entries(args).slice(0, 2)
        .map(([k, v]) => {
          const s = String(v);
          return k + '="' + (s.length > 25 ? s.slice(0, 25) + '…' : s) + '"';
        });
      showStatus('⟳ ' + tool + '(' + parts.join(', ') + ')');
    } else if (eventType === 'skill:tool_result') {
      const icon = eventData.success ? '✓' : '✗';
      const preview = (eventData.output_preview || '').replace(/\n/g, ' ').slice(0, 60);
      showStatus(icon + ' ' + preview);
      clearStatusAfterDelay(1500);
    } else if (eventType === 'agent:spawned') {
      const name = eventData.task_name || eventData.task_id || 'worker';
      showStatus('⟳ Worker "' + name + '" started');
      clearStatusAfterDelay(3000);
    } else if (eventType === 'agent:task_complete') {
      const name = eventData.task_name || eventData.task_id || 'worker';
      const icon = eventData.success ? '✓' : '✗';
      showStatus(icon + ' Worker "' + name + '" done');
      clearStatusAfterDelay(3000);
    } else if (eventType === 'agent:plan_update') {
      const plan = eventData.plan || [];
      const done = plan.filter(function(s) { return s.status === 'completed'; }).length;
      const current = plan.find(function(s) { return s.status === 'in_progress'; });
      if (current) {
        showStatus('📋 [' + done + '/' + plan.length + '] ' + current.step);
      } else if (done === plan.length && plan.length > 0) {
        showStatus('📋 ✓ All ' + plan.length + ' steps done');
        clearStatusAfterDelay(2000);
      } else {
        showStatus('📋 Plan: ' + plan.length + ' steps');
      }
      // Update the plan panel
      renderPlanPanel(plan);
    }
  }

  // ━━━ Workflow event display ━━━
  function handleWorkflowEvent(eventType, eventData) {
    // Finalize any in-progress agent message before showing step marker
    finalizeAgent();

    if (eventType === 'workflow:start') {
      addSystem('📋 Workflow: ' + (eventData.workflow || 'workflow') + ' (' + eventData.total_steps + ' steps)');
    } else if (eventType === 'workflow:step_start') {
      addSystem('▶ Step ' + eventData.step + '/' + eventData.total_steps + ': ' + eventData.instruction);
    } else if (eventType === 'workflow:step_complete') {
      addSystem('✓ Step ' + eventData.step + ' complete');
    } else if (eventType === 'workflow:step_failed') {
      addSystem('✗ Step ' + eventData.step + ' failed: ' + (eventData.error || 'unknown'));
    } else if (eventType === 'workflow:complete') {
      addSystem('✓ Workflow complete (' + eventData.completed_steps + '/' + eventData.total_steps + ' steps)');
    } else if (eventType === 'workflow:paused') {
      addSystem('⚠ Workflow paused at step ' + eventData.step + ': ' + (eventData.error || ''));
      addSystem('Options: retry, skip, or stop');
    } else if (eventType === 'workflow:waiting_input') {
      addSystem('⏳ Workflow waiting for your input (step ' + eventData.step + '/' + eventData.total_steps + ')');
      addSystem('💬 ' + (eventData.question || 'Please provide input to continue'));
    }
    scrollDown();
  }

  // ━━━ Message rendering ━━━
  function addMsg(cls, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + cls;
    el.textContent = text;
    messagesEl.appendChild(el);
    return el;
  }
  function addUser(text) { addMsg('user', text); }
  function addAgent(text) {
    currentAgentMsg = null;
    addMsg('agent', text);
  }
  function addSystem(text) { addMsg('system', text); }
  function addEvent(text) { addMsg('event', text); }

  // ━━━ Single-line status indicator (replaces in place) ━━━
  let statusLineEl = null;
  let statusLineClearTimer = null;

  function showStatus(text) {
    if (statusLineClearTimer) {
      clearTimeout(statusLineClearTimer);
      statusLineClearTimer = null;
    }
    if (!statusLineEl) {
      statusLineEl = document.createElement('div');
      statusLineEl.className = 'status-line';
      messagesEl.appendChild(statusLineEl);
    }
    statusLineEl.textContent = text;
    // Keep it at the bottom
    if (statusLineEl.parentNode) {
      messagesEl.appendChild(statusLineEl);
    }
    scrollDown();
  }

  function clearStatus() {
    if (statusLineEl) {
      statusLineEl.remove();
      statusLineEl = null;
    }
    if (statusLineClearTimer) {
      clearTimeout(statusLineClearTimer);
      statusLineClearTimer = null;
    }
  }

  function clearStatusAfterDelay(ms) {
    if (statusLineClearTimer) clearTimeout(statusLineClearTimer);
    statusLineClearTimer = setTimeout(clearStatus, ms || 2000);
  }

  // ━━━ Plan panel ━━━
  let planDismissed = false;  // user manually closed — don't re-show until new plan

  function renderPlanPanel(plan) {
    if (!plan || plan.length === 0) {
      planPanel.classList.add('hidden');
      return;
    }

    // If user dismissed, only re-show if this is a brand new plan
    // (detected by checking if step texts changed)
    if (planDismissed) {
      planDismissed = false;  // new plan update → allow showing again
    }

    const done = plan.filter(function(s) { return s.status === 'completed'; }).length;
    planProgress.textContent = done + '/' + plan.length;

    planSteps.innerHTML = '';
    plan.forEach(function(s) {
      var el = document.createElement('div');
      el.className = 'plan-step ' + s.status;

      var icon = document.createElement('span');
      icon.className = 'step-icon';
      if (s.status === 'completed') icon.textContent = '✅';
      else if (s.status === 'in_progress') icon.textContent = '🔄';
      else icon.textContent = '⬚';

      var text = document.createElement('span');
      text.className = 'step-text';
      text.textContent = s.step;

      el.appendChild(icon);
      el.appendChild(text);
      planSteps.appendChild(el);
    });

    planPanel.classList.remove('hidden');

    // Auto-hide when all steps are completed
    if (done === plan.length) {
      setTimeout(function() {
        planPanel.classList.add('hidden');
      }, 5000);
    }
  }

  function appendSyncLabel(source) {
    var label = document.createElement('div');
    label.className = 'sync-label';
    label.textContent = 'via ' + source;
    messagesEl.appendChild(label);
    return label;
  }

  function handleSyncUser(source, userText, messageId) {
    appendSyncLabel(source);
    if (userText) {
      addMsg('user', userText);
    }
    if (messageId) {
      syncState.set(messageId, { source: source, userShown: Boolean(userText) });
    }
  }

  function handleSyncComplete(source, userText, response, messageId) {
    var state = messageId ? syncState.get(messageId) : null;
    if (!state) {
      appendSyncLabel(source);
      if (userText) {
        addMsg('user', userText);
      }
    } else {
      if (!state.userShown && userText) {
        addMsg('user', userText);
        state.userShown = true;
      }
      syncState.delete(messageId);
    }
    if (response) {
      addMsg('agent', response);
    }
  }

  function showThinking() {
    if (thinkingEl) return;
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.textContent = 'Thinking';
    messagesEl.appendChild(thinkingEl);
    scrollDown();
  }
  function hideThinking() {
    if (thinkingEl) {
      thinkingEl.remove();
      thinkingEl = null;
    }
  }

  function appendChunk(text) {
    if (!currentAgentMsg) {
      currentAgentMsg = document.createElement('div');
      currentAgentMsg.className = 'msg agent';
      messagesEl.appendChild(currentAgentMsg);
    }
    currentAgentMsg.textContent += text;
  }

  function finalizeAgent() {
    currentAgentMsg = null;
  }

  function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ━━━ Input handling ━━━
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;

    hideCmdMenu();
    addUser(text);
    ws.send(JSON.stringify({ type: 'message', content: text }));

    inputEl.value = '';
    inputEl.style.height = 'auto';
    scrollDown();
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    var items = getVisibleCmdItems();

    // Arrow keys for command menu navigation
    if (cmdMenu.classList.contains('visible') && items.length > 0) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        cmdActiveIdx = Math.min(cmdActiveIdx + 1, items.length - 1);
        items.forEach(function(el, i) { el.classList.toggle('active', i === cmdActiveIdx); });
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        cmdActiveIdx = Math.max(cmdActiveIdx - 1, 0);
        items.forEach(function(el, i) { el.classList.toggle('active', i === cmdActiveIdx); });
        return;
      }
      if ((e.key === 'Tab' || e.key === 'Enter') && cmdActiveIdx >= 0) {
        e.preventDefault();
        var name = items[cmdActiveIdx].querySelector('.cmd-name').textContent;
        inputEl.value = name;
        hideCmdMenu();
        if (e.key === 'Enter') sendMessage();
        return;
      }
      if (e.key === 'Escape') {
        hideCmdMenu();
        return;
      }
    }

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      hideCmdMenu();
      sendMessage();
    }
  });

  // Show command menu when typing /
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';

    var val = inputEl.value;
    if (val.startsWith('/') && !val.includes(' ') || (val.startsWith('/') && val.split(' ').length <= 2 && COMMANDS.some(function(c) { return c.name.startsWith(val); }))) {
      cmdActiveIdx = 0;
      showCmdMenu(val);
    } else {
      hideCmdMenu();
    }
  });

  inputEl.addEventListener('blur', () => {
    // Small delay so mousedown on menu item fires first
    setTimeout(hideCmdMenu, 150);
  });

  planClose.addEventListener('click', function(e) {
    e.stopPropagation();
    planPanel.classList.add('hidden');
    planDismissed = true;
  });

  // ━━━ Boot ━━━
  connect();
})();
</script>
</body>
</html>
